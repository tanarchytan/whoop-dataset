name: validate-contributions

# Runs on every PR and push: rejects the journal file, PII (emails), disallowed files,
# and incomplete metadata. Pure stdlib Python — no dependencies to install.
# No path filter on purpose: this is a REQUIRED check, so it must report on every PR
# (a path-filtered required check hangs "pending" on PRs that don't touch contributions/).

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate all contributions
        run: python3 scripts/validate_contribution.py
